<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Nguyen Van Anh | Backend Engineer Intern
  </title>

  <meta
    name="description"
    content="Portfolio of Nguyen Van Anh - Backend Engineer Intern specializing in Java, Spring Boot, PostgreSQL, and scalable backend systems.">

  <meta
    name="keywords"
    content="Backend Engineer Intern, Java, Spring Boot, PostgreSQL, Portfolio">

  <meta
    name="author"
    content="Nguyen Van Anh">

  <!-- Open Graph -->
  <meta property="og:title" content="Nguyen Van Anh | Backend Engineer Intern">
  <meta property="og:description" content="Portfolio of Nguyen Van Anh - Backend Engineer Intern specializing in Java, Spring Boot, PostgreSQL, and scalable backend systems.">
  <meta property="og:type" content="website">

  <link
    rel="manifest"
    href="./manifest.json">

  <link
    rel="icon"
    href="./assets/images/favicon/favicon-32.png">

  <!-- Devicons — icon cho skill chips -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css">

  <link
    rel="stylesheet"
    href="./css/main.css">

</head>

<body>

  <!-- FLOATING ACTIONS -->

  <aside
    class="floating-actions"
    aria-label="Quick Actions">

    <button
      id="scroll-top-btn"
      class="floating-action"
      title="Back to top"
      aria-label="Scroll back to top">

      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20" height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true">
        <polyline points="18 15 12 9 6 15"/>
      </svg>

    </button>

  </aside>

  <!-- HERO -->

  <header
    id="hero"
    class="hero"
    role="banner">

    <div
      id="hero-container"
      class="hero__container page-container">

    </div>

  </header>

  <!-- MOBILE NAV (visible < 900px) -->

  <nav
    id="mobile-nav"
    class="mobile-nav"
    aria-label="Section navigation">

  </nav>

  <!-- MAIN -->

  <main
    class="main-layout page-container"
    role="main">

    <!-- SIDEBAR -->

    <aside
      id="sidebar"
      class="sidebar"
      aria-label="Section navigation">

    </aside>

    <!-- CONTENT -->

    <div
      class="content">

      <section
        id="about"
        class="section"
        aria-labelledby="about-heading">

      </section>

      <section
        id="skills"
        class="section"
        aria-labelledby="skills-heading">

      </section>

      <section
        id="experience"
        class="section"
        aria-labelledby="experience-heading">

      </section>

      <section
        id="projects"
        class="section"
        aria-labelledby="projects-heading">

      </section>

      <section
        id="contact"
        class="section"
        aria-labelledby="contact-heading">

      </section>

    </div>

  </main>

  <!-- FOOTER -->

  <footer
    id="footer"
    class="footer"
    role="contentinfo">

  </footer>

  <!-- EmailJS SDK -->
<script
  src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>

  <script
    type="module"
    src="./js/main.js">
  </script>

</body>

</html>
