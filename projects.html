<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>All Projects — Nguyen Van Anh</title>

  <meta
    name="description"
    content="All projects by Nguyen Van Anh — Backend Engineer specializing in Java, Spring Boot, and scalable systems.">

  <link rel="icon" href="./assets/favicon/favicon.ico">

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css">

  <link rel="stylesheet" href="./css/main.css">

  <style>

    /* ==========================================
       PAGE-SPECIFIC — Projects page
    ========================================== */

    .projects-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .projects-topbar {
      background: var(--color-bg-elevated);
      border-bottom: 1px solid var(--color-border-subtle);
      padding: 18px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      transition:
        background-color var(--transition-medium),
        border-color var(--transition-medium);
    }

    .projects-topbar__inner {
      width: min(100% - 48px, 1100px);
      margin-inline: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .projects-topbar__back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--fs-btn);
      font-weight: 500;
      color: var(--color-text-secondary);
      transition: color var(--transition-fast);
    }

    .projects-topbar__back:hover {
      color: var(--color-accent);
    }

    .projects-topbar__back svg {
      flex-shrink: 0;
    }

    .projects-topbar__right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .projects-topbar__count {
      font-size: var(--fs-body-small);
      color: var(--color-text-muted);
    }

    /* ── Main area ── */
    .projects-main {
      flex: 1;
      padding: 48px 0 80px;
    }

    .projects-main__inner {
      width: min(100% - 48px, 1100px);
      margin-inline: auto;
    }

    /* ── Page heading ── */
    .projects-heading {
      margin-bottom: 12px;
    }

    .projects-subheading {
      font-size: var(--fs-body);
      color: var(--color-text-secondary);
      margin-bottom: 40px;
      max-width: 520px;
    }

    /* ── Filter bar ── */
    .projects-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 36px;
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-border);
      background: transparent;
      font-size: var(--fs-body-small);
      font-weight: 500;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .filter-btn:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    .filter-btn.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    /* ── Grid ── */
    .projects-full-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* Featured badge */
    .project-card__badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--color-accent) 14%, transparent);
      color: var(--color-accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Hide cards via filter */
    .project-card[data-hidden="true"] {
      display: none;
    }

    /* Empty state */
    .projects-empty {
      display: none;
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 0;
      color: var(--color-text-muted);
      font-size: var(--fs-body);
    }

    .projects-empty.visible {
      display: block;
    }

    /* ── Responsive ── */

    @media (max-width: 960px) {
      .projects-full-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .projects-full-grid {
        grid-template-columns: 1fr;
      }

      .projects-topbar__inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .projects-topbar__right {
        width: 100%;
        justify-content: space-between;
      }
    }

  </style>

</head>

<body class="projects-page">

  <!-- TOP BAR -->
  <div class="projects-topbar">
    <div class="projects-topbar__inner">

      <a href="./index.html" class="projects-topbar__back">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16" height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to Portfolio
      </a>

      <div class="projects-topbar__right">

        <span class="projects-topbar__count" id="project-count">
          6 projects
        </span>

        <!-- Theme toggle -->
        <div
          class="theme-toggle"
          role="group"
          aria-label="Color theme">
          <button
            class="theme-toggle__option btn-text"
            data-theme-option="light">
            Light
          </button>
          <button
            class="theme-toggle__option btn-text"
            data-theme-option="dark">
            Dark
          </button>
        </div>

        <div
          class="lang-toggle"
          role="group"
          aria-label="Language">
          <button
            class="lang-toggle__option btn-text active"
            data-lang-option="en"
            aria-pressed="true">
            EN
          </button>
          <button
            class="lang-toggle__option btn-text"
            data-lang-option="vi"
            aria-pressed="false">
            VI
          </button>
        </div>

      </div>

    </div>
  </div>

  <!-- MAIN -->
  <main class="projects-main" role="main">
    <div class="projects-main__inner">

      <h1 class="section-title projects-heading">All Projects</h1>
      <p class="projects-subheading">
        Backend systems, APIs, and tools I've designed and built — from enterprise platforms to side experiments.
      </p>

      <!-- FILTERS -->
      <div class="projects-filters" role="group" aria-label="Filter by tag">
        <button class="filter-btn active" data-tag="all">All</button>
        <button class="filter-btn" data-tag="Spring Boot">Spring Boot</button>
        <button class="filter-btn" data-tag="Java">Java</button>
        <button class="filter-btn" data-tag="PostgreSQL">PostgreSQL</button>
        <button class="filter-btn" data-tag="WebSocket">WebSocket</button>
        <button class="filter-btn" data-tag="Redis">Redis</button>
        <button class="filter-btn" data-tag="Kafka">Kafka</button>
        <button class="filter-btn" data-tag="University Projects">University Projects</button>
      </div>

      <!-- GRID -->
      <div class="projects-full-grid" id="projects-grid">

        <!-- Cards are rendered by JS below -->
        <p class="projects-empty" id="projects-empty">
          No projects match this filter.
        </p>

      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
    <div class="footer__container">
      <p class="footer__text footer-text">
        © <span id="footer-year"></span> Nguyen Van Anh. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- TOAST (shared) -->

  <script type="module">

    import { initTheme, toggleTheme, updateThemeButtons } from "./js/modules/theme.js";
    import {
      getProjects,
      initLang,
      localizeTag,
      setLang,
      t,
      updateLangButtons
    } from "./js/modules/lang.js";

    const filterTags = [
      "Spring Boot",
      "Java",
      "PostgreSQL",
      "WebSocket",
      "Redis",
      "Kafka",
      "University Projects"
    ];

    /* ── Theme ── */
    initLang();
    initTheme();

    document.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-theme-option]");
      if (btn) toggleTheme(btn.dataset.themeOption);
    });

    document.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-lang-option]");
      if (!btn) return;

      setLang(btn.dataset.langOption);
      renderPage();
    });

    /* ── Footer year ── */
    document.getElementById("footer-year").textContent = new Date().getFullYear();

    /* ── Render cards ── */

    const grid = document.getElementById("projects-grid");
    const empty = document.getElementById("projects-empty");
    const countEl = document.getElementById("project-count");
    const filters = document.querySelector(".projects-filters");

    function renderPage() {
      const projects = getProjects();

      document.title = `${t("projectsPage.title")} - Nguyen Van Anh`;
      document.querySelector(".projects-topbar__back").lastChild.textContent = ` ${t("projectsPage.back")}`;
      document.querySelector(".projects-heading").textContent = t("projectsPage.title");
      document.querySelector(".projects-subheading").textContent = t("projectsPage.subtitle");
      document.querySelector(".projects-filters").setAttribute("aria-label", t("projectsPage.filterLabel"));
      document.querySelector("[data-theme-option='light']").textContent = t("light");
      document.querySelector("[data-theme-option='dark']").textContent = t("dark");
      document.querySelector("[data-theme-option='light']").parentElement.setAttribute("aria-label", t("themeLabel"));
      document.querySelector("[data-lang-option='en']").parentElement.setAttribute("aria-label", t("languageLabel"));
      document.getElementById("footer-year").textContent = new Date().getFullYear();
      document.querySelector(".footer-text").lastChild.textContent = ` Nguyen Van Anh. ${t("footer")}`;
      empty.textContent = t("projectsPage.empty");

      filters.innerHTML = `
        <button class="filter-btn active" data-tag="all">${t("projectsPage.all")}</button>
        ${filterTags
          .map((tag) => `<button class="filter-btn" data-tag="${localizeTag(tag)}">${localizeTag(tag)}</button>`)
          .join("")}
      `;

      grid.querySelectorAll(".project-card").forEach((card) => card.remove());
      projects.forEach((project) => grid.appendChild(renderCard(project)));

      applyFilter("all");
      updateThemeButtons();
      updateLangButtons();
    }

    function renderCard(project) {
      const article = document.createElement("article");
      article.className = "project-card";
      article.dataset.tags = JSON.stringify(project.tags);
      article.setAttribute("aria-label", project.title);

      const featuredBadge = project.featured
        ? `<div class="project-card__badge">★ ${t("projectsPage.featured")}</div>`
        : "";

      const demoBtn = project.demo
        ? `<a href="${project.demo}" target="_blank" rel="noopener noreferrer" class="btn btn-card">Demo</a>`
        : "";

      const githubBtn = project.github
        ? `<a href="${project.github}" target="_blank" rel="noopener noreferrer" class="btn btn-card">GitHub</a>`
        : "";

      article.innerHTML = `
        <div class="project-card__thumbnail">
          <img
            src="${project.thumbnail}"
            alt="${project.title} thumbnail"
            loading="lazy">
        </div>
        <div class="project-card__content">
          ${featuredBadge}
          <h2 class="project-card__title card-title">${project.title}</h2>
          <p class="project-card__description body-small">${project.description}</p>
          <div class="project-card__tags">
            ${project.tags.map(t => `<span class="tech-tag">${t}</span>`).join("")}
          </div>
          <div class="project-card__actions">
            ${demoBtn}
            ${githubBtn}
          </div>
        </div>
      `;

      return article;
    }

    function applyFilter(tag) {
      let visible = 0;

      grid.querySelectorAll(".project-card").forEach(card => {
        const tags = JSON.parse(card.dataset.tags);
        const show = tag === "all" || tags.includes(tag);
        card.dataset.hidden = show ? "false" : "true";
        if (show) visible++;
      });

      countEl.textContent = `${visible} ${visible === 1 ? t("projectsPage.project") : t("projectsPage.projects")}`;
      empty.classList.toggle("visible", visible === 0);
    }

    filters.addEventListener("click", (e) => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;

      filters.querySelectorAll(".filter-btn").forEach((item) => item.classList.remove("active"));
      btn.classList.add("active");
      applyFilter(btn.dataset.tag);
    });

    renderPage();

  </script>

</body>
</html>
